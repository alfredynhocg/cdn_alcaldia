name: Publicar en GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'dist/tokens.css'
      - 'src/tokens.css'

  # Permite ejecutar manualmente desde la pestana Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez; cancela el anterior si hay uno en cola
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que dist/ esta sincronizado
        run: |
          if ! diff -q src/tokens.css dist/tokens.css > /dev/null 2>&1; then
            echo "ERROR: dist/tokens.css no esta sincronizado con src/tokens.css"
            echo "Ejecuta 'make build' antes de hacer push."
            diff src/tokens.css dist/tokens.css
            exit 1
          fi
          echo "OK: dist/ esta sincronizado."

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
